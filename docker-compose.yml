version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: churn_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: churn_predictor

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: churn_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URL: mongodb://mongodb:27017
    depends_on:
      - mongodb
    volumes:
      - ./backend/ml/artifacts:/app/ml/artifacts

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: churn_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
